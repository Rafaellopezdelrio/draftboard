name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on same ref when new commit lands. Saves CI
# minutes on rapid pushes — only the latest commit needs to pass.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: TypeScript + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm test

      - name: Coverage gate (no regression)
        run: npm run test:coverage

      - name: Build (Vite frontend only — Tauri/Rust skipped on CI)
        run: npm run build

      # Bundle size budget. Fails if any chunk crosses HARD_FAIL_KB
      # (see scripts/bundle-check.mjs). Catches regressions from new
      # deps or accidental large imports before they ship.
      - name: Bundle size budget
        run: npm run bundle-check
