name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: TypeScript + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm test

      - name: Coverage gate (no regression)
        run: npm run test:coverage

      - name: Build (Vite frontend only — Tauri/Rust skipped on CI)
        run: npm run build
