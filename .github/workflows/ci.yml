name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on same ref when new commit lands. Saves CI
# minutes on rapid pushes — only the latest commit needs to pass.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend matrix: TypeScript + vitest + bundle gate on Linux ──
  # Windows is added for tsc parity (catches case-sensitivity bugs that
  # only fail on case-insensitive filesystems). vitest + bundle-check
  # only run on Linux to save minutes — the test code is OS-agnostic.
  test:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      # No submodules: the Vite frontend + vitest don't need the CF Worker
      # source (it deploys separately via wrangler). Fetching it also breaks
      # checkout — cloudflare-worker is an orphaned gitlink with no .gitmodules.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # BLOCKING dependency-advisory gate (prod deps, high+). Baseline verified
      # clean 2026-07-17; if this starts failing, a real advisory landed — fix
      # or pin, don't re-soften the gate.
      - name: npm audit (prod, high+)
        if: matrix.os == 'ubuntu-latest'
        run: npm audit --omit=dev --audit-level=high

      - name: Type check
        run: npm run typecheck

      # ESLint react-hooks gate (Linux only — OS-agnostic, no need to double
      # up). Catches rules-of-hooks violations + stale-closure deps.
      - name: Lint (react-hooks)
        if: matrix.os == 'ubuntu-latest'
        run: npm run lint

      - name: Unit + integration tests (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: npm test

      - name: Coverage gate (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: npm run test:coverage

      - name: Build Vite frontend
        run: npm run build

      # Bundle size budget. Fails if any chunk crosses HARD_FAIL_KB
      # (see scripts/bundle-check.mjs). Catches regressions from new
      # deps or accidental large imports before they ship.
      - name: Bundle size budget (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: npm run bundle-check

  # ── Rust backend: clippy + rustfmt + cargo test ──
  # Skipped from the main test job because Rust toolchain install + cargo
  # build doubles CI time. Runs in parallel as its own job.
  rust:
    name: Rust (clippy + fmt + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache-workspaces: "src-tauri"

      # Tauri requires Linux system libs for the webkit2gtk dep tree.
      # Mirrors what tauri-action does internally.
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: clippy (deny warnings)
        run: cd src-tauri && cargo clippy --all-targets -- -D warnings

      - name: rustfmt check
        run: cd src-tauri && cargo fmt --check

      - name: Unit tests
        run: cd src-tauri && cargo test --release

      # Dependency vulnerability scan against the RustSec advisory DB. The
      # network-facing crate tree (reqwest / tokio-tungstenite / rustls, plus a
      # deliberate localhost-only NoVerify TLS path) is worth watching.
      # BLOCKING advisory gate. Known-accepted advisories are documented in
      # src-tauri/.cargo/audit.toml (with justification + unblock condition);
      # anything new fails the build.
      - name: cargo audit (advisory gate)
        run: |
          cargo install cargo-audit --locked
          cd src-tauri && cargo audit
