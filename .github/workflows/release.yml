name: Release Draftboard

# Triggered when you push a tag like `v0.3.0`. Builds a signed Tauri
# installer for Windows, uploads it to a new GitHub Release, and prints
# the resulting URL + signature so you can paste them into the worker's
# /updater/latest.json manifest.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   - TAURI_SIGNING_PRIVATE_KEY:           full contents of ~/.tauri/draftboard.key
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD:  the password you set when generating it
#
# Usage:
#   git tag v0.3.0
#   git push origin v0.3.0
#
# After the action finishes, copy `version`, the .sig content, and the
# release URL into cloudflare-worker/src/worker.js LATEST_VERSION block,
# then `npx wrangler deploy` from the worker dir.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build + sign Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Tauri build (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Print signature + checksums
        shell: pwsh
        run: |
          $sigPath = "src-tauri/target/release/bundle/nsis/Draftboard_${{ github.ref_name }}_x64-setup.exe.sig"
          if (Test-Path $sigPath) {
            Write-Host "=== .sig content (paste this into worker manifest as 'signature') ==="
            Get-Content $sigPath -Raw
          }

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Draftboard ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
